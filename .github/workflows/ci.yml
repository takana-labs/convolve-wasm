name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pages-preflight:
    concurrency:
      group: ci-preflight-${{ github.event_name }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Collect GitHub Pages metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          collect() {
            local endpoint="$1"
            local destination="$2"
            if ! timeout 20s gh api "$endpoint" > "$destination"; then
              printf '{"_preflight_error":"GitHub API request failed for %s"}\n' "$endpoint" > "$destination"
            fi
          }
          collect "repos/${GITHUB_REPOSITORY}/pages" "$RUNNER_TEMP/pages.json"
          collect "repos/${GITHUB_REPOSITORY}" "$RUNNER_TEMP/repository.json"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate Node toolchain
        run: npm run validate:toolchain

      - name: Check synchronized site URL
        run: npm run check:site-url

      - name: Validate GitHub Pages settings
        env:
          PAGES_METADATA_PATH: ${{ runner.temp }}/pages.json
          REPOSITORY_METADATA_PATH: ${{ runner.temp }}/repository.json
        run: node scripts/pages-preflight.mjs

  verify:
    needs: pages-preflight
    concurrency:
      group: ci-verify-${{ github.event_name }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Validate Node toolchain
        run: npm run validate:toolchain

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: convolve-wasm

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Validate project identity
        run: npm run validate:identity

      - name: Validate documentation image assets
        run: npm run validate:docs

      - name: Validate repository links
        run: npm run validate:links

      - name: Test site URL configuration
        run: npm run test:site

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --workspace

      - name: Build WASM bindings
        run: npm run build:wasm

      - name: Test TypeScript and package consumer
        run: npm run test:ts

      - name: Build library and demo
        run: npm run build

      - name: Validate JSR package
        shell: bash
        run: |
          set -o pipefail
          npm run validate:jsr 2>&1 | tee "$RUNNER_TEMP/jsr-dry-run.log"

      - name: Upload JSR dry-run diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jsr-dry-run-diagnostics
          path: ${{ runner.temp }}/jsr-dry-run.log
          if-no-files-found: warn

      - name: Build and validate GitHub Pages artifact
        run: npm run build:pages && npm run validate:pages

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Test generated WASM in Chromium
        run: wasm-pack test --headless --chrome crates/convolve-core

      - name: Test browser demo in Chromium and WebKit
        run: npm run test:e2e

      - name: Test GitHub Pages root and transfer paths in Chromium
        run: npm run test:pages

      - name: Upload GitHub Pages smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-smoke-diagnostics
          path: test-results
          if-no-files-found: warn

      - name: Inspect package contents
        run: npm pack -w @takana-labs/convolve-wasm --dry-run

      - name: Verify prebuilt FFmpeg core is absent
        shell: bash
        run: |
          set +e
          output=$(npm ls @ffmpeg/core 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ] || grep -q '@ffmpeg/core@' <<<"$output"; then
            echo "@ffmpeg/core must not be present" >&2
            exit 1
          fi

      - name: Upload verified GitHub Pages artifact
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/demo/dist

  deploy:
    needs: verify
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    concurrency:
      group: pages-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy verified GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify deployed Pages SHA and assets
        run: node scripts/public-site-smoke.mjs
