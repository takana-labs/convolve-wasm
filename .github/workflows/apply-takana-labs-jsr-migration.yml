name: Apply non-workflow Takana Labs migration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'chore/takana-labs-jsr-migration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Apply non-workflow identity migration
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');

          const replacements = [
            ['@agunal/convolve-wasm', '@takana-labs/convolve-wasm'],
            ['@agunal/convolve-demo', '@takana-labs/convolve-demo'],
            ['https://raw.githubusercontent.com/agunal/convolve-wasm', 'https://raw.githubusercontent.com/takana-labs/convolve-wasm'],
            ['https://github.com/agunal/convolve-wasm', 'https://github.com/takana-labs/convolve-wasm'],
            ['https://agunal.github.io/convolve-wasm/', 'https://convolve-wasm.app/'],
            ['agunal.github.io/convolve-wasm', 'convolve-wasm.app'],
          ];

          const files = execFileSync('git', ['ls-files', '-z'], { encoding: 'utf8' })
            .split('\0')
            .filter(Boolean);

          for (const file of files) {
            if (
              file.startsWith('.github/workflows/') ||
              file.startsWith('docs/superpowers/') ||
              file === 'scripts/validate-project-identity.mjs'
            ) continue;
            const buffer = fs.readFileSync(file);
            if (buffer.includes(0)) continue;
            let content = buffer.toString('utf8');
            for (const [from, to] of replacements) content = content.replaceAll(from, to);
            fs.writeFileSync(file, content);
          }

          const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          root.scripts['validate:jsr'] = 'cd packages/convolve-wasm && npx --yes jsr@0.14.3 publish --dry-run';
          if (!root.scripts.check.includes('validate:jsr')) {
            root.scripts.check = `${root.scripts.check} && npm run validate:jsr`;
          }
          fs.writeFileSync('package.json', `${JSON.stringify(root, null, 2)}\n`);

          const packagePath = 'packages/convolve-wasm/package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.name = '@takana-labs/convolve-wasm';
          pkg.repository = {
            type: 'git',
            url: 'git+https://github.com/takana-labs/convolve-wasm.git',
            directory: 'packages/convolve-wasm',
          };
          pkg.bugs = { url: 'https://github.com/takana-labs/convolve-wasm/issues' };
          pkg.homepage = 'https://convolve-wasm.app/';
          delete pkg.publishConfig;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

          const demoPath = 'apps/demo/package.json';
          const demo = JSON.parse(fs.readFileSync(demoPath, 'utf8'));
          demo.name = '@takana-labs/convolve-demo';
          demo.dependencies = { '@takana-labs/convolve-wasm': '0.1.0' };
          fs.writeFileSync(demoPath, `${JSON.stringify(demo, null, 2)}\n`);

          let rootReadme = fs.readFileSync('README.md', 'utf8');
          rootReadme = rootReadme.replace(
            'The hosted application runs the same browser-local pipeline without requiring installation. npm installation remains available for applications that want to call the public API directly.',
            'The hosted application runs the same browser-local pipeline without requiring installation. Applications can add the public API from JSR with `npx jsr add @takana-labs/convolve-wasm`.',
          );
          if (!rootReadme.includes('## Install from JSR')) {
            rootReadme = rootReadme.replace(
              '## Public API',
              '## Install from JSR\n\n```bash\nnpx jsr add @takana-labs/convolve-wasm\n```\n\n## Public API',
            );
          }
          fs.writeFileSync('README.md', rootReadme);
          NODE

          cat > packages/convolve-wasm/jsr.json <<'JSON'
          {
            "$schema": "https://jsr.io/schema/config-file.v1.json",
            "name": "@takana-labs/convolve-wasm",
            "version": "0.1.0",
            "exports": "./dist/index.js",
            "publish": {
              "include": [
                "dist/**",
                "README.md",
                "LICENSE"
              ]
            }
          }
          JSON

          npm install --package-lock-only --ignore-scripts
          rm -f .migration-preparation-marker
          rm -f docs/superpowers/specs/2026-07-16-takana-labs-jsr-migration-checkpoint.md
          rm -f docs/superpowers/plans/2026-07-16-takana-labs-jsr-migration-status.md

      - name: Commit generated non-workflow changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A -- . ':!.github/workflows'
          git commit -m 'chore: apply Takana Labs workspace migration'
          git push origin HEAD:${{ github.head_ref }}
