name: Build JSR Release Candidate

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: Exact merged commit to verify and package
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out exact source commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0

      - name: Verify exact current main commit
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ inputs.source_commit }}" =~ ^[0-9a-f]{40}$ ]]
          actual=$(git rev-parse HEAD)
          test "$actual" = "${{ inputs.source_commit }}"
          git fetch --force origin refs/heads/main:refs/remotes/origin/main
          test "$actual" = "$(git rev-parse origin/main)"
          test -z "$(git status --porcelain)"
          printf 'Source commit: %s\n' "$actual"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Validate toolchain, identity, documentation, and links
        run: npm run validate:toolchain && npm run validate:identity && npm run validate:docs && npm run validate:links

      - name: Verify manual browser matrix is complete
        shell: bash
        run: |
          set -euo pipefail
          for browser in Chrome Edge Safari; do
            mapfile -t rows < <(grep -E "^\\| $browser \\|" docs/browser-support.md)
            if [ "${#rows[@]}" -ne 1 ]; then
              echo "Expected exactly one $browser matrix row" >&2
              exit 1
            fi
            row="${rows[0]}"
            if grep -q '—' <<<"$row"; then
              echo "$browser matrix row still contains blank fields: $row" >&2
              exit 1
            fi
            if ! grep -Eq '\| Pass \|$' <<<"$row"; then
              echo "$browser matrix row is not a recorded pass: $row" >&2
              exit 1
            fi
          done

      - name: Verify physical Android gate is complete
        shell: bash
        run: |
          set -euo pipefail
          grep -Fx '**Physical Android status:** Pass' \
            docs/testing/2026-07-17-mobile-safe-rejection.md

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --workspace

      - name: Build WASM bindings
        run: npm run build:wasm

      - name: Test TypeScript and package consumer
        run: npm run test:ts

      - name: Build library and demo
        run: npm run build

      - name: Validate JSR package
        run: npm run validate:jsr

      - name: Build and validate Pages artifact
        run: npm run build:pages && npm run validate:pages

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Test generated WASM in Chrome
        run: wasm-pack test --headless --chrome crates/convolve-core

      - name: Test browser demo in Chromium and WebKit
        run: npm run test:e2e

      - name: Test GitHub Pages subpath in Chromium
        run: npm run test:pages

      - name: Stage and inspect exact JSR artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$RUNNER_TEMP/jsr-release-candidate"
          package_dir="$artifact_dir/package"
          mkdir -p "$package_dir"
          cp packages/convolve-wasm/jsr.json "$package_dir/"
          cp packages/convolve-wasm/package.json "$package_dir/"
          cp packages/convolve-wasm/README.md "$package_dir/"
          cp packages/convolve-wasm/LICENSE "$package_dir/"
          cp -R packages/convolve-wasm/dist "$package_dir/"

          (cd "$package_dir" && npx --yes jsr@0.14.3 publish --dry-run) \
            | tee "$artifact_dir/JSR-DRY-RUN.txt"
          find "$package_dir" -type f -printf '%P\n' \
            | LC_ALL=C sort \
            | tee "$artifact_dir/CONTENTS.txt"

          if grep -R -n -F '@ffmpeg/core' "$package_dir"; then
            echo '@ffmpeg/core found in candidate artifact' >&2
            exit 1
          fi

          tar -C "$artifact_dir" -czf "$artifact_dir/convolve-wasm-jsr-0.1.1.tgz" package
          (cd "$artifact_dir" && sha256sum convolve-wasm-jsr-0.1.1.tgz | tee SHA256SUMS)
          printf 'source_commit=%s\n' "$(git rev-parse HEAD)" > "$artifact_dir/RELEASE-METADATA.txt"
          printf 'package=@takana-labs/convolve-wasm@0.1.1\n' >> "$artifact_dir/RELEASE-METADATA.txt"
          test -z "$(git status --porcelain)"

      - name: Upload inspected JSR release candidate
        uses: actions/upload-artifact@v4
        with:
          name: jsr-release-candidate
          path: |
            ${{ runner.temp }}/jsr-release-candidate/convolve-wasm-jsr-0.1.1.tgz
            ${{ runner.temp }}/jsr-release-candidate/SHA256SUMS
            ${{ runner.temp }}/jsr-release-candidate/CONTENTS.txt
            ${{ runner.temp }}/jsr-release-candidate/JSR-DRY-RUN.txt
            ${{ runner.temp }}/jsr-release-candidate/RELEASE-METADATA.txt
          if-no-files-found: error
          retention-days: 30
