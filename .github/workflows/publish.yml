name: Publish Inspected npm Artifact

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: Exact tagged source commit
        required: true
        type: string
      artifact_run_id:
        description: Successful Build Release Candidate workflow run ID
        required: true
        type: string
      tarball_sha256:
        description: Approved lowercase SHA-256 of the inspected .tgz
        required: true
        type: string
      bootstrap_acknowledgement:
        description: Type BOOTSTRAP @agunal/convolve-wasm@0.1.0
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm

    steps:
      - name: Validate approval inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ inputs.source_commit }}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${{ inputs.artifact_run_id }}" =~ ^[0-9]+$ ]]
          [[ "${{ inputs.tarball_sha256 }}" =~ ^[0-9a-f]{64}$ ]]
          test "${{ inputs.bootstrap_acknowledgement }}" = \
            'BOOTSTRAP @agunal/convolve-wasm@0.1.0'

      - name: Check out exact source commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0

      - name: Verify source commit and release tag
        shell: bash
        run: |
          set -euo pipefail
          actual=$(git rev-parse HEAD)
          test "$actual" = "${{ inputs.source_commit }}"
          git fetch --force origin refs/tags/v0.1.0:refs/tags/v0.1.0
          tagged=$(git rev-list -n 1 v0.1.0)
          test "$tagged" = "$actual"
          test -z "$(git status --porcelain)"

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Pin supported npm CLI
        run: npm install --global npm@11.15.0

      - name: Verify candidate workflow run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          set -euo pipefail
          run_json=$(gh run view "$ARTIFACT_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --json name,conclusion,event)
          printf '%s\n' "$run_json"
          test "$(jq -r .name <<<"$run_json")" = 'Build Release Candidate'
          test "$(jq -r .conclusion <<<"$run_json")" = 'success'
          test "$(jq -r .event <<<"$run_json")" = 'workflow_dispatch'

      - name: Download inspected artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          set -euo pipefail
          gh run download "$ARTIFACT_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name npm-release-candidate --dir release-artifact

      - name: Verify artifact identity and contents
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tarballs < <(find release-artifact -maxdepth 1 -type f -name '*.tgz' -print)
          test "${#tarballs[@]}" -eq 1
          tarball="${tarballs[0]}"

          (cd release-artifact && sha256sum --check SHA256SUMS)
          actual_hash=$(sha256sum "$tarball" | awk '{print $1}')
          test "$actual_hash" = "${{ inputs.tarball_sha256 }}"

          grep -Fx "source_commit=${{ inputs.source_commit }}" \
            release-artifact/RELEASE-METADATA.txt

          unpacked=$(mktemp -d)
          tar -xzf "$tarball" -C "$unpacked"
          node - "$unpacked/package/package.json" <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const failures = [];
          if (manifest.name !== '@agunal/convolve-wasm') failures.push('unexpected package name');
          if (manifest.version !== '0.1.0') failures.push('unexpected package version');
          if (manifest.private === true) failures.push('package is private');
          if (manifest.publishConfig?.access !== 'public') failures.push('public access is not enforced');
          if (manifest.publishConfig?.provenance !== true) failures.push('provenance is not enabled');
          if (manifest.repository?.url !== 'git+https://github.com/agunal/convolve-wasm.git') failures.push('repository URL mismatch');
          if (failures.length) {
            console.error(failures.join('\n'));
            process.exit(1);
          }
          NODE

          if grep -R -n -F '@ffmpeg/core' "$unpacked/package"; then
            echo '@ffmpeg/core found in approved artifact' >&2
            exit 1
          fi

      - name: Verify package and version are unpublished
        shell: bash
        run: |
          set -euo pipefail
          for spec in '@agunal/convolve-wasm' '@agunal/convolve-wasm@0.1.0'; do
            set +e
            view_output=$(npm view "$spec" name version 2>&1)
            status=$?
            set -e
            printf '%s\n' "$view_output"
            if [ "$status" -eq 0 ]; then
              echo "$spec already exists; the one-time bootstrap path must stop" >&2
              exit 1
            fi
            if ! grep -q 'E404' <<<"$view_output"; then
              echo "Registry lookup for $spec failed for a reason other than absence" >&2
              exit 1
            fi
          done

      - name: Verify one-time bootstrap credential is present
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$NODE_AUTH_TOKEN"

      - name: Publish approved first-release tarball with provenance
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: |
          set -euo pipefail
          tarball=$(find release-artifact -maxdepth 1 -type f -name '*.tgz' -print -quit)
          test -n "$tarball"
          npm publish "$tarball" --access public --provenance

      - name: Verify first release is visible
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            set +e
            published=$(npm view @agunal/convolve-wasm@0.1.0 version 2>/dev/null)
            status=$?
            set -e
            if [ "$status" -eq 0 ] && [ "$published" = '0.1.0' ]; then
              echo 'First release is visible in the npm registry.'
              echo 'Immediately revoke NPM_BOOTSTRAP_TOKEN, configure npm trusted publishing,'
              echo 'and set package publishing access to disallow traditional tokens.'
              exit 0
            fi
            sleep 5
          done
          echo 'Publish returned successfully, but the version did not become visible within 60 seconds.' >&2
          exit 1
