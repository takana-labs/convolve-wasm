name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pages-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Collect GitHub Pages metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          collect() {
            local endpoint="$1"
            local destination="$2"
            if ! timeout 20s gh api "$endpoint" > "$destination"; then
              printf '{"_preflight_error":"GitHub API request failed for %s"}\n' "$endpoint" > "$destination"
            fi
          }
          collect "repos/${GITHUB_REPOSITORY}/pages" "$RUNNER_TEMP/pages.json"
          collect "repos/${GITHUB_REPOSITORY}" "$RUNNER_TEMP/repository.json"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Check synchronized site URL
        run: npm run check:site-url

      - name: Validate GitHub Pages settings
        env:
          PAGES_METADATA_PATH: ${{ runner.temp }}/pages.json
          REPOSITORY_METADATA_PATH: ${{ runner.temp }}/repository.json
        run: node scripts/pages-preflight.mjs

  build:
    needs: pages-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: convolve-wasm-pages

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build GitHub Pages application
        run: npm run build:pages

      - name: Validate GitHub Pages artifact
        run: npm run validate:pages

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test GitHub Pages root and transfer paths
        run: npm run test:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Verify deployed Pages SHA and assets
        run: node scripts/public-site-smoke.mjs
